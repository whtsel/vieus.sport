<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vieus Sport · NEON STADIUM</title>
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ========== CYBER‑STADIUM UI ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0c0f;
            --bg-card: rgba(18, 22, 28, 0.8);
            --neon-cyan: #00f7ff;
            --neon-pink: #ff2a6d;
            --neon-purple: #b400ff;
            --glow-cyan: 0 0 15px #00f7ff;
            --glow-pink: 0 0 15px #ff2a6d;
            --text-light: #ffffff;
            --text-dim: #b0b8c5;
            --border-glass: 1px solid rgba(255, 255, 255, 0.1);
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(0,247,255,0.15) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(255,42,109,0.12) 0%, transparent 35%),
                        repeating-linear-gradient(45deg, rgba(0,247,255,0.02) 0px, rgba(0,247,255,0.02) 2px, transparent 2px, transparent 6px);
            z-index: -2;
            animation: bgPulse 15s infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== HEADER ===== */
        header {
            background: rgba(10, 12, 15, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;           /* allow wrapping on small screens */
            row-gap: 10px;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo i {
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            font-size: 2rem;
        }

        .sport-header-tab {
            background: rgba(0, 247, 255, 0.1);
            border: 2px solid var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            color: var(--neon-cyan);
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-family: var(--font-display);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: auto;
        }

        .search-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-pink);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-size: 0.95rem;
            width: 280px;
            transition: all 0.3s;
            font-family: var(--font-body);
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            width: 330px;
            background: rgba(0, 247, 255, 0.1);
        }

        .search-btn {
            background: var(--neon-pink);
            color: black;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: var(--glow-pink);
            font-size: 1.2rem;
        }

        .search-btn:hover {
            background: #ff1a5e;
            transform: scale(1.1);
            box-shadow: 0 0 25px #ff2a6d;
        }

        /* ===== NOTIFICATION ===== */
        .notification-bar {
            position: fixed;
            top: 90px;
            right: 20px;
            background: rgba(18, 22, 28, 0.95);
            backdrop-filter: blur(12px);
            border-left: 6px solid var(--neon-cyan);
            border-radius: 16px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            box-shadow: var(--glow-cyan), 0 10px 30px rgba(0,0,0,0.5);
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            max-width: 400px;
        }

        .notification-bar.show {
            transform: translateX(0);
        }

        .notification-icon i {
            color: var(--neon-cyan);
            font-size: 1.8rem;
        }

        .notification-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--neon-cyan);
        }

        .notification-message {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .notification-close {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.7;
        }

        /* ===== LEAGUE HEADERS ===== */
        .league-section {
            margin-bottom: 40px;
        }

        .league-header {
            background: rgba(18, 22, 28, 0.7);
            backdrop-filter: blur(8px);
            border: 2px solid;
            border-image: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink)) 1;
            border-radius: 50px;
            padding: 16px 24px;
            margin: 30px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0,247,255,0.2);
        }

        .league-header:hover {
            transform: scale(1.02);
            box-shadow: 0 0 35px rgba(255,42,109,0.3);
        }

        .league-name {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .match-count {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            color: black;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 0 15px var(--neon-cyan);
            white-space: nowrap;         /* prevent wrapping of "4 matches" */
        }

        .league-matches {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        /* ===== MATCH CARDS ===== */
        .match-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
            border-radius: 30px;
            padding: 24px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
            border-radius: 32px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .match-card:hover::before {
            opacity: 1;
        }

        .match-card.live {
            border: 2px solid var(--neon-pink);
            box-shadow: var(--glow-pink);
        }

        .match-card.upcoming {
            border: 2px solid var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }

        .match-status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: var(--font-display);
        }

        .match-card.live .match-status {
            background: var(--neon-pink);
            color: black;
            box-shadow: var(--glow-pink);
        }

        .match-card.upcoming .match-status {
            background: var(--neon-cyan);
            color: black;
            box-shadow: var(--glow-cyan);
        }

        .match-league {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .match-time {
            font-size: 1.4rem;
            font-weight: 800;
            font-family: var(--font-display);
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .teams-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            margin: 15px 0 30px;
            position: relative;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            width: 100%;          /* ensure full width for name centering */
        }

        .team-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--neon-cyan);
            background: #111;
            padding: 12px;
            box-shadow: var(--glow-cyan);
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .match-card.live .team-logo {
            border-color: var(--neon-pink);
            box-shadow: var(--glow-pink);
        }

        .team-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ===== IMPROVED TEAM NAME – FITS PERFECTLY WITH GLOW ===== */
        .team-name {
            display: inline-block;
            max-width: 100%;
            background: rgba(0, 0, 0, 0.8);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px var(--neon-cyan), 0 0 5px rgba(0,247,255,0.5);
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            color: white;
            text-shadow: 0 0 8px var(--neon-cyan);
            word-break: break-word;
            white-space: normal;
            line-height: 1.3;
            transition: 0.2s;
        }

        .match-card.live .team-name {
            box-shadow: 0 0 20px var(--neon-pink), 0 0 5px rgba(255,42,109,0.5);
            text-shadow: 0 0 8px var(--neon-pink);
            border-color: rgba(255,255,255,0.4);
        }

        .vs-divider {
            font-size: 2rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            font-family: var(--font-display);
        }

        .countdown-container {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            color: black;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 2px;
            box-shadow: var(--glow-pink);
            margin: 10px auto 0;
            font-family: var(--font-display);
            width: fit-content;
            text-align: center;
        }

        .watch-btn-container {
            width: 100%;
            margin-top: 20px;
        }

        .watch-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: var(--font-display);
        }

        .watch-btn:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: var(--glow-cyan);
            transform: scale(1.02);
        }

        .match-card.live .watch-btn {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }
        .match-card.live .watch-btn:hover {
            background: var(--neon-pink);
            color: black;
            box-shadow: var(--glow-pink);
        }

        /* ===== SECTION HEADER ===== */
        .section-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 40px 0 20px;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: var(--glow-cyan);
        }

        .section-title {
            font-size: 2rem;
            font-weight: 800;
            font-family: var(--font-display);
            background: linear-gradient(135deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-actions {
            margin-left: auto;
        }

        .action-btn {
            padding: 10px 22px;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: var(--neon-pink);
            color: black;
            box-shadow: var(--glow-pink);
        }

        /* ===== MODAL – GLASS CYBER ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: rgba(18, 22, 28, 0.9);
            backdrop-filter: blur(20px);
            border: 3px solid;
            border-image: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink)) 1;
            border-radius: 60px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 40px;
            box-shadow: 0 0 60px rgba(0,247,255,0.3);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .modal-competition {
            color: var(--neon-cyan);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .modal-rating {
            color: gold;
            font-size: 1.5rem;
            margin: 15px 0;
        }

        .modal-close {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .modal-close:hover {
            background: var(--neon-pink);
            color: black;
            transform: rotate(90deg);
        }

        .modal-teams {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            margin: 40px 0;
        }

        .modal-team-logo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid var(--neon-cyan);
            background: white;
            padding: 20px;
            box-shadow: var(--glow-cyan);
        }

        .modal-team-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 15px;
        }

        .modal-vs {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: var(--glow-pink);
            font-family: var(--font-display);
        }

        .modal-streams {
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 30px;
            margin: 30px 0;
        }

        .streams-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .streams-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .stream-item {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--neon-pink);
            border-radius: 30px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .stream-item:hover {
            background: var(--neon-pink);
            color: black;
            transform: scale(1.05);
            box-shadow: var(--glow-pink);
        }

        .stream-watch-now {
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .stream-language {
            font-size: 1rem;
            opacity: 0.9;
        }

        .modal-actions {
            margin-top: 30px;
        }

        .modal-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: black;
            box-shadow: 0 0 30px rgba(0,247,255,0.5);
        }

        .modal-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(255,42,109,0.7);
        }

        /* ===== MOBILE DOCK ===== */
        .mobile-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 12, 15, 0.9);
            backdrop-filter: blur(15px);
            border-top: 3px solid var(--neon-cyan);
            box-shadow: 0 -5px 30px rgba(0,247,255,0.2);
            padding: 12px 0;
            z-index: 1000;
            display: flex;
            justify-content: space-around;
        }

        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            padding: 8px 16px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 40px;
        }

        .dock-item i {
            font-size: 1.8rem;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .dock-item.active {
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            background: rgba(0,247,255,0.1);
        }

        .dock-item[data-view="home"] i { color: var(--neon-cyan); }
        .dock-item[data-view="live"] i { color: var(--neon-pink); }
        .dock-item[data-view="upcoming"] i { color: var(--neon-purple); }

        /* ===== FOOTER ===== */
        footer {
            background: rgba(10,12,15,0.8);
            backdrop-filter: blur(8px);
            border-top: 2px solid var(--neon-pink);
            padding: 30px 0 80px;
            margin-top: 50px;
            text-align: center;
        }

        .footer-logo i {
            color: var(--neon-cyan);
            font-size: 2rem;
        }

        /* ===== CLEAN PLAYER MODAL ===== */
        .player-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 3000;
            display: none;
        }

        .player-modal.active {
            display: block;
        }

        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Clean header with click-through fix */
        .player-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 10;
            display: flex;
            justify-content: space-between; /* Space out buttons */
            align-items: center;
            pointer-events: none;
            /* UPDATED: Added transition and default visible state */
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        /* Class to hide the header */
        .player-header.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Player Back Button */
        .player-back-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-cyan);
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            pointer-events: auto;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.3);
        }

        .player-back-btn:hover {

    <!-- ===== ORIGINAL JAVASCRIPT – FULLY INTACT ===== -->
    <script>
        // ===== MASTER ARCHITECT FIX: PRODUCTION STREAM CONTROLLER =====
        // ===== CONSTANTS & MIRRORS =====
        const STREAM_MIRRORS = ['apl392.me', 'apl389.me', 'apl388.me', 'apl13.me', 'apl6.me']; 
        const DEFAULT_MIRROR = STREAM_MIRRORS[0];

        // ===== DOM ELEMENTS =====
        const liveContainer = document.getElementById('liveContainer');
        const upcomingContainer = document.getElementById('upcomingContainer');
        const backBtn = document.getElementById('backBtn');
        const sectionTitle = document.getElementById('sectionTitle');
        const refreshBtn = document.getElementById('refreshBtn');
        const dockItems = document.querySelectorAll('.dock-item');
        const matchModal = document.getElementById('matchModal');
        const modalClose = document.getElementById('modalClose');
        const streamsList = document.getElementById('streamsList');
        const modalStreams = document.getElementById('modalStreams');
        const modalWatchBtn = document.getElementById('modalWatchBtn');
        const searchBar = document.getElementById('searchBar');
        const searchBtn = document.getElementById('searchBtn');
        const notificationBar = document.getElementById('notificationBar');
        const notificationTitle = document.getElementById('notificationTitle');
        const notificationMessage = document.getElementById('notificationMessage');
        const notificationClose = document.getElementById('notificationClose');
        
        // Player modal elements
        const playerModal = document.getElementById('playerModal');
        const playerCloseBtn = document.getElementById('playerCloseBtn');
        const aliezInput = document.getElementById('alieztv-url');
        const loadBtn = document.getElementById('load-btn');
        const streamFrame = document.getElementById('stream-frame');
        const adOverlay = document.getElementById('ad-overlay');
        const timerSpan = document.getElementById('timer');
        const skipBtn = document.getElementById('skip-btn');
        const inputBar = document.getElementById('input-bar');
        const mobileFullscreenBtn = document.getElementById('mobileFullscreenBtn');
        const playerUIHeader = document.getElementById('playerUIHeader');

        // ===== GLOBAL VARIABLES =====
        let allMatches = [];
        let filteredMatches = [];
        let currentView = 'home';
        let currentModalMatch = null;
        let countdownTimers = {};
        let timeLeft = 10;
        let countdown = null;
        let isStreamLoaded = false;
        let uiHideTimer = null;

        // ===== NAVIGATION GUARD =====
        window.onpopstate = function(event) {
            if (playerModal?.classList.contains('active')) {
                closePlayer();
            }
            if (matchModal?.classList.contains('active')) {
                closeModal();
            }
        };

        // ===== CONFIGURATION =====
        const API_BASE_URL = 'https://raw.githubusercontent.com/whtsel/try/main/index.json';
        
        // Top European Clubs for Popularity Boost
        const TOP_CLUBS = [
            "Man Utd", "Man City", "Liverpool", "Arsenal", "Chelsea", "Tottenham", 
            "Real Madrid", "Barcelona", "Atletico", "Bayern", "PSG", "Inter", "Juventus"
        ];
        
        // Competition Priority Weights
        const COMPETITION_WEIGHTS = {
            "world cup": 10, "afcon": 10, "euros": 10, "nations league": 10,
            "champions league": 9, "club world cup": 9,
            "premier league": 8, "la liga": 8, "bundesliga": 8, "serie a": 8, "ligue 1": 8,
            "fa cup": 6, "copa del rey": 6, "league cup": 6, "dfb pokal": 6,
            "championship": 4, "segunda": 4, "2nd division": 4,
            "wsl": 2, "feminine": 2, "women": 2
        };

        function calculateMatchScore(match) {
            let score = 0;
            const compName = (match.competition || '').toLowerCase();
            const teams = match.matchup.split(' – ').map(t => t.trim());
            
            let baseScore = 0;
            for (const [keyword, weight] of Object.entries(COMPETITION_WEIGHTS)) {
                if (compName.includes(keyword)) {
                    baseScore = Math.max(baseScore, weight * 500);
                }
            }
            if (baseScore === 0) baseScore = 100;
            score += baseScore;
            
            const hasTopClub = teams.some(team => TOP_CLUBS.some(topClub => 
                team.toLowerCase().includes(topClub.toLowerCase())
            ));
            if (hasTopClub) score += 1500;
            
            if (match.matchup.toLowerCase().includes('women') || 
                compName.includes('wsl') || compName.includes('feminine')) score += 200;
            
            if (match.is_live) score += 500;
            
            return score;
        }
        
        function getCompetitionLabel(match) {
            if (match.competition && match.competition !== "Undefined") return match.competition;
            if (match.league) return match.league;
            return "";
        }
        
        function filterExpiredMatches() {
            const now = new Date();
            const matchesToRemove = [];
            allMatches = allMatches.filter(match => {
                if (!match.is_live || !match.parsed_datetime) return true;
                const matchStartTime = new Date(match.parsed_datetime);
                if (isNaN(matchStartTime.getTime())) return true;
                const estimatedEndTime = new Date(matchStartTime.getTime() + (110 * 60 * 1000));
                const timeSinceEnd = now.getTime() - estimatedEndTime.getTime();
                const isExpired = timeSinceEnd > (25 * 60 * 1000);
                if (isExpired) {
                    matchesToRemove.push(match);
                    return false;
                }
                return true;
            });
            if (matchesToRemove.length > 0) {
                matchesToRemove.forEach(match => {
                    const matchId = match.event_id || `${match.matchup.split(' – ')[0]}-${match.matchup.split(' – ')[1]}-${match.parsed_datetime}`;
                    const matchCard = liveContainer.querySelector(`.match-card[data-match-id="${matchId}"]`);
                    if (matchCard) matchCard.remove();
                });
            }
            return matchesToRemove.length > 0;
        }
        
        const PRIORITIZED_COMPETITIONS = [
            { name: "Premier League", keywords: ["england. premier league"], rank: 1, icon: "fas fa-crown", color: "#3d195b", hot: true },
            { name: "FIFA World Cup (Qualifiers)", keywords: ["world cup", "world cup qualifiers", "fifa world cup"], rank: 2, icon: "fas fa-globe-americas", color: "#1e90ff", hot: true },
            { name: "FIFA Club World Cup", keywords: ["club world cup", "fifa club world"], rank: 3, icon: "fas fa-trophy", color: "#ffd700", hot: true },
            { name: "AFCON (Africa Cup of Nations)", keywords: ["afcon", "africa cup", "african cup", "africa cup of nations"], rank: 4, icon: "fas fa-globe-africa", color: "#008000", hot: true },
            { name: "UEFA Champions League", keywords: ["champions league", "uefa champions"], rank: 5, icon: "fas fa-star", color: "#ff6b00", hot: true },
            { name: "La Liga", keywords: ["spain. la liga"], rank: 6, icon: "fas fa-futbol", color: "#ff0000", hot: true },
            { name: "Bundesliga", keywords: ["germany. bundesliga"], rank: 7, icon: "fas fa-shield-alt", color: "#dd0000", hot: true },
            { name: "Serie A", keywords: ["italy. serie a"], rank: 8, icon: "fas fa-flag", color: "#008c45", hot: true },
            { name: "Ligue 1", keywords: ["france. ligue 1"], rank: 9, icon: "fas fa-star", color: "#0d5eaf", hot: true },
            { name: "Europa League", keywords: ["europa league", "uefa europa"], rank: 10, icon: "fas fa-trophy", color: "#ff4500", hot: false },
            { name: "FA Cup / Carabao Cup", keywords: ["fa cup", "carabao cup", "efl cup"], rank: 11, icon: "fas fa-cup", color: "#ff0000", hot: false },
            { name: "Nations League", keywords: ["nations league", "uefa nations"], rank: 12, icon: "fas fa-flag", color: "#4b0082", hot: false },
            { name: "EFL Championship", keywords: ["england. championship"], rank: 13, icon: "fas fa-arrow-up", color: "#0d5eaf", hot: false }
        ];

        function extractChannelId(streamUrl) {
            if (!streamUrl) return null;
            const urlPattern = /[?&](c|id)=(\d+)/;
            const match = streamUrl.match(urlPattern);
            if (match && match[2]) return match[2];
            if (/^\d+$/.test(streamUrl)) return streamUrl;
            return null;
        }

        function updatePlayer() {
            const inputUrl = aliezInput.value.trim();
            const channelID = extractChannelId(inputUrl);
            if (channelID) {
                const streamUrl = `https://emb.${DEFAULT_MIRROR}/player/live.php?id=${channelID}`;
                setupIframeForMobile(streamUrl);
                startAdSequence();
                if (inputBar) inputBar.style.display = 'none';
                isStreamLoaded = true;
                showNotification('Stream Loading', 'Establishing secure connection...');
                showMobileHint();
                resetUIHideTimer();
            } else {
                showNotification('Error', 'Invalid Link. Ensure it contains a Channel ID.');
            }
        }

        function resetUIHideTimer() {
            if (!playerUIHeader) return;
            playerUIHeader.classList.remove('hidden');
            if (uiHideTimer) clearTimeout(uiHideTimer);
            uiHideTimer = setTimeout(() => {
                if (isStreamLoaded) playerUIHeader.classList.add('hidden');
            }, 3000);
        }

        function setupIframeForMobile(url) {
            if (!streamFrame) return;
            streamFrame.src = 'about:blank';
            const attrs = {
                'playsinline': '',
                'webkit-playsinline': '',
                'allow': 'autoplay; fullscreen; picture-in-picture',
                'sandbox': 'allow-scripts allow-same-origin allow-forms',
                'loading': 'lazy'
            };
            Object.keys(attrs).forEach(key => streamFrame.setAttribute(key, attrs[key]));
            window.requestAnimationFrame(() => { streamFrame.src = url; });
            if (window.innerWidth <= 768) {
                streamFrame.style.cssText = `
                    width: 100vw !important;
                    height: 100vh !important;
                    position: fixed !important;
                    top: 0 !important;
                    left: 0 !important;
                    background: #000 !important;
                `;
            }
        }

        function startAdSequence() {
            if (!adOverlay || !timerSpan) return;
            timeLeft = 10;
            adOverlay.style.display = 'flex';
            if (skipBtn) skipBtn.style.display = 'none';
            if (countdown) clearInterval(countdown);
            countdown = setInterval(() => {
                timeLeft--;
                timerSpan.innerText = timeLeft;
                if (timeLeft <= 5 && skipBtn) skipBtn.style.display = 'block';
                if (timeLeft <= 0) skipAd();
            }, 1000);
        }

        function skipAd() {
            if (countdown) { clearInterval(countdown); countdown = null; }
            if (adOverlay) adOverlay.style.display = 'none';
        }

        function closePlayer() {
            playerModal.classList.remove('active');
            document.body.style.overflow = 'auto';
            if (streamFrame) streamFrame.src = 'about:blank';
            if (countdown) { clearInterval(countdown); countdown = null; }
            if (uiHideTimer) clearTimeout(uiHideTimer);
            isStreamLoaded = false;
            if (inputBar) inputBar.style.display = 'flex';
            if (playerUIHeader) playerUIHeader.classList.remove('hidden');
        }

        function toggleFullscreen() {
            const playerContainer = document.querySelector('.player-container');
            if (!playerContainer) return;
            if (!document.fullscreenElement) {
                const req = playerContainer.requestFullscreen || playerContainer.webkitRequestFullscreen;
                if (req) req.call(playerContainer);
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function loadStreamFromFixture(streamUrl, matchTitle) {
            const channelId = extractChannelId(streamUrl);
            if (!channelId) {
                showNotification('Stream Error', 'Channel configuration missing.');
                return;
            }
            playerModal.classList.add('active');
            document.body.style.overflow = 'hidden';
            history.pushState({player: true}, "Player", "#stream");
            if (aliezInput) aliezInput.value = streamUrl;
            const finalUrl = `https://emb.${DEFAULT_MIRROR}/player/live.php?id=${channelId}`;
            setupIframeForMobile(finalUrl);
            startAdSequence();
            if (inputBar) inputBar.style.display = 'none';
            isStreamLoaded = true;
            resetUIHideTimer();
        }

        function getTeamLogo(teamName, logoUrl) {
            const cleanTeamName = teamName.trim().replace('(W)', '').trim();
            if (logoUrl && typeof logoUrl === 'string' && logoUrl.trim() !== '' && logoUrl !== 'null' && logoUrl !== 'undefined') {
                let fixedUrl = logoUrl.trim();
                if (fixedUrl.startsWith('//')) fixedUrl = 'https:' + fixedUrl;
                return fixedUrl;
            }
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(cleanTeamName)}&background=random&color=fff&size=256&bold=true`;
        }

        function updateCountdown(matchId, startTime) {
            const now = new Date();
            const matchDate = new Date(startTime);
            if (isNaN(matchDate.getTime())) return "Invalid time";
            const diff = matchDate.getTime() - now.getTime();
            if (diff <= 0) return "Match Started";
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            return days > 0 ? `${days}d ${hours}h ${minutes}m` : (hours > 0 ? `${hours}h ${minutes}m ${seconds}s` : `${minutes}m ${seconds}s`);
        }

        function startCountdownTimers() {
            const upcomingCards = document.querySelectorAll('.match-card.upcoming');
            upcomingCards.forEach(card => {
                const matchId = card.dataset.matchId;
                const startTime = card.dataset.startTime;
                if (!matchId || !startTime) return;
                const countdownElement = card.querySelector('.countdown-timer');
                if (countdownElement) {
                    const timeLeft = updateCountdown(matchId, startTime);
                    countdownElement.textContent = timeLeft;
                    if (timeLeft === "Match Started" || timeLeft === "Invalid time") {
                        moveMatchToLive(card, matchId);
                    }
                }
            });
        }

        function moveMatchToLive(card, matchId) {
            const matchData = allMatches.find(m => m.event_id === matchId || 
                `${m.matchup.split(' – ')[0]}-${m.matchup.split(' – ')[1]}-${m.parsed_datetime}` === matchId);
            if (matchData) {
                card.remove();
                if (matchData.streams?.some(s => s.stream_url?.includes('aliez'))) {
                    matchData.is_live = true;
                    const priority = getCompetitionPriority(matchData);
                    const sectionName = priority ? priority.name : (matchData.competition || "Other");
                    let liveSection = liveContainer.querySelector(`.league-section:has(.league-header:contains('${sectionName}'))`);
                    if (!liveSection) {
                        liveSection = document.createElement('div');
                        liveSection.className = 'league-section';
                        const leagueHeader = document.createElement('div');
                        leagueHeader.className = 'league-header';
                        leagueHeader.style.borderLeftColor = priority ? priority.color : "#8b0000";
                        leagueHeader.innerHTML = `<div class="league-name">${sectionName}</div><div class="match-count">1 matches</div>`;
                        leagueHeader.onclick = () => liveSection.classList.toggle('collapsed');
                        const grid = document.createElement('div');
                        grid.className = 'league-matches';
                        liveSection.appendChild(leagueHeader);
                        liveSection.appendChild(grid);
                        liveContainer.appendChild(liveSection);
                    }
                    const matchCard = createMatchCard(matchData, true, priority || {displayName: sectionName, color: "#8b0000", icon: "fas fa-tv", hot: true});
                    liveSection.querySelector('.league-matches').appendChild(matchCard);
                    const matchCount = liveSection.querySelector('.match-count');
                    const currentCount = parseInt(matchCount.textContent.split(' ')[0]);
                    matchCount.textContent = `${currentCount + 1} matches`;
                }
            }
        }

        async function loadData() {
            try {
                showLoading();
                const response = await fetch(API_BASE_URL);
                const data = await response.json();
                const uniqueMatches = new Map();
                const liveMatches = [];
                const upcomingMatches = [];
                
                data.forEach(match => {
                    if (!match.matchup || !match.team_logos) return;
                    const teams = match.matchup.split(' – ');
                    if (teams.length < 2) return;
                    const uniqueId = `${teams[0]}-${teams[1]}-${match.parsed_datetime}`;
                    if (uniqueMatches.has(uniqueId)) return;
                    uniqueMatches.set(uniqueId, true);
                    
                    if (match.is_live && match.streams?.some(s => s.stream_url?.includes('aliez'))) liveMatches.push(match);
                    else if (!match.is_live && getCompetitionPriority(match)) upcomingMatches.push(match);
                });
                
                allMatches = [...liveMatches, ...upcomingMatches];
                filteredMatches = [...allMatches];
                renderAllMatches();
            } catch (error) {
                showError();
            }
        }

        function showLoading() {
            liveContainer.innerHTML = '<p>Loading live matches...</p>';
            upcomingContainer.innerHTML = '<p>Loading upcoming matches...</p>';
        }

        function showError() {
            liveContainer.innerHTML = '<p>Connection Error.</p>';
        }

        function getCompetitionPriority(match) {
            const compName = (match.competition || '').toLowerCase();
            return PRIORITIZED_COMPETITIONS.find(c => c.keywords.some(k => compName.includes(k.toLowerCase()))) || null;
        }

        function renderAllMatches() {
            filterExpiredMatches();
            const sortedMatches = [...filteredMatches].sort((a, b) => calculateMatchScore(b) - calculateMatchScore(a));
            const liveMatches = sortedMatches.filter(m => m.is_live);
            const upcomingMatches = sortedMatches.filter(m => !m.is_live);
            renderLiveMatches(liveContainer, liveMatches);
            renderUpcomingMatches(upcomingContainer, upcomingMatches);
            setTimeout(startCountdownTimers, 100);
        }

        function renderLiveMatches(container, matches) {
            container.innerHTML = matches.length === 0 ? '<p>No live matches.</p>' : '';
            const groups = {};
            matches.forEach(match => {
                const comp = getCompetitionLabel(match) || "Other";
                if (!groups[comp]) groups[comp] = { displayName: comp, matches: [], color: "#8b0000", icon: "fas fa-tv", hot: true };
                groups[comp].matches.push(match);
            });
            Object.values(groups).forEach(g => createLeagueSection(container, g, true));
        }

        function renderUpcomingMatches(container, matches) {
            container.innerHTML = matches.length === 0 ? '<p>No upcoming matches.</p>' : '';
            const groups = {};
            matches.forEach(match => {
                const comp = getCompetitionLabel(match) || "Other";
                if (!groups[comp]) groups[comp] = { displayName: comp, matches: [], color: "#8b0000", icon: "fas fa-tv", hot: true };
                groups[comp].matches.push(match);
            });
            Object.values(groups).forEach(g => createLeagueSection(container, g, false));
        }

        function createLeagueSection(container, group, isLive) {
            const leagueSection = document.createElement('div');
            leagueSection.className = 'league-section';
            const leagueHeader = document.createElement('div');
            leagueHeader.className = 'league-header';
            leagueHeader.style.borderLeftColor = group.color;
            leagueHeader.innerHTML = `<div class="league-name">${group.displayName}</div><div class="match-count">${group.matches.length} matches</div>`;
            leagueHeader.onclick = () => leagueSection.classList.toggle('collapsed');
            
            const grid = document.createElement('div');
            grid.className = 'league-matches';
            group.matches.forEach(m => grid.appendChild(createMatchCard(m, isLive, group)));
            
            leagueSection.appendChild(leagueHeader);
            leagueSection.appendChild(grid);
            container.appendChild(leagueSection);
        }

        function createMatchCard(match, isLive, group) {
            const teams = match.matchup.split(' – ');
            const card = document.createElement('div');
            card.className = `match-card ${isLive ? 'live' : 'upcoming'}`;
            card.dataset.startTime = match.parsed_datetime;
            card.dataset.matchId = match.event_id || Math.random();
            card.innerHTML = `
                <div class="match-status ${isLive ? 'status-live' : 'status-upcoming'}">${isLive ? 'LIVE' : 'UPCOMING'}</div>
                <div class="match-league">${group.displayName}</div>
                <div class="match-time">${formatTime(match.parsed_datetime)}</div>
                <div class="teams-display">
                    <div class="team"><div class="team-logo"><img src="${getTeamLogo(teams[0], match.team_logos[0]?.logo_url)}"></div><div class="team-name">${teams[0]}</div></div>
                    <div class="vs-divider">VS</div>
                    <div class="team"><div class="team-logo"><img src="${getTeamLogo(teams[1], match.team_logos[1]?.logo_url)}"></div><div class="team-name">${teams[1]}</div></div>
                </div>
                ${!isLive ? `<div class="countdown-container"><span class="countdown-timer"></span></div>` : ''}
                <div class="watch-btn-container"><button class="watch-btn">PREVIEW</button></div>
            `;
            card.querySelector('.watch-btn').onclick = () => openPreview(match, group);
            return card;
        }

        function openPreview(match, group) {
            currentModalMatch = match;
            document.getElementById('modalTitle').textContent = match.matchup;
            document.getElementById('modalCompetition').textContent = group.displayName;
            populateStreamLinks(match);
            
            const streams = match.streams?.filter(s => s.stream_url?.includes('aliez')) || [];
            if (streams.length > 0) {
                modalWatchBtn.onclick = () => loadStreamFromFixture(streams[0].stream_url, match.matchup);
                modalWatchBtn.style.display = 'flex';
            } else {
                modalWatchBtn.style.display = 'none';
            }
            
            matchModal.classList.add('active');
            document.body.style.overflow = 'hidden';
            history.pushState({modal: true}, "Preview", "#preview");
        }

        function populateStreamLinks(match) {
            const streams = match.streams?.filter(s => s.stream_url?.includes('aliez')) || [];
            streamsList.innerHTML = streams.length ? streams.map((s, index) => `
                <div class="stream-item" onclick="loadStreamFromFixture('${s.stream_url}', '${match.matchup}')">
                    <div class="stream-watch-now">STREAM ${index + 1}</div>
                    <div class="stream-language">${s.language || 'English'}</div>
                </div>
            `).join('') : '<p>No premium streams.</p>';
            modalStreams.classList.add('active');
        }

        function closeModal() {
            matchModal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function formatTime(dt) {
            if (!dt) return 'TBD';
            const d = new Date(dt);
            if (isNaN(d.getTime())) return dt;
            const correctedTime = new Date(d.getTime() - (1 * 60 * 60 * 1000));
            return correctedTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function switchView(view) {
            currentView = view;
            dockItems.forEach(i => i.classList.toggle('active', i.dataset.view === view));
            liveContainer.style.display = (view === 'upcoming') ? 'none' : 'block';
            upcomingContainer.style.display = (view === 'live') ? 'none' : 'block';
            backBtn.style.display = (view === 'home') ? 'none' : 'flex';
        }

        function showNotification(t, m) {
            notificationTitle.textContent = t;
            notificationMessage.textContent = m;
            notificationBar.classList.add('show');
            setTimeout(() => notificationBar.classList.remove('show'), 5000);
        }

        function showMobileHint() {
            const hint = document.createElement('div');
            hint.className = 'mobile-hint';
            hint.innerHTML = `
                <div style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px;">Mobile Fullscreen</div>
                <div style="font-size: 0.9rem;">Click the fullscreen button for optimal viewing</div>
            `;
            document.body.appendChild(hint);
            setTimeout(() => {
                if (hint.parentNode) hint.parentNode.removeChild(hint);
            }, 5000);
        }

        function setupEventListeners() {
            backBtn.onclick = () => switchView('home');
            refreshBtn.onclick = loadData;
            modalClose.onclick = () => { history.back(); };
            playerCloseBtn.onclick = () => { history.back(); }; 
            loadBtn.onclick = updatePlayer;
            skipBtn.onclick = skipAd;
            dockItems.forEach(i => i.onclick = () => switchView(i.dataset.view));

            playerModal.addEventListener('mousemove', resetUIHideTimer);
            playerModal.addEventListener('touchstart', resetUIHideTimer);
            playerModal.addEventListener('click', resetUIHideTimer);

            searchBtn.onclick = performSearch;
            searchBar.addEventListener('input', debounceSearch);
            searchBar.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
             });
        }

        function performSearch() {
            const searchTerm = searchBar.value.trim().toLowerCase();
            if (!searchTerm) {
                filteredMatches = [...allMatches];
                renderAllMatches();
                showNotification('Search', 'Showing all matches');
                return;
            }
            filteredMatches = allMatches.filter(match => {
                const teams = match.matchup.split(' – ').map(t => t.toLowerCase());
                const competition = (match.competition || '').toLowerCase();
                const league = (match.league || '').toLowerCase();
                const time = (match.parsed_datetime || '').toLowerCase();
                const teamMatch = teams.some(team => 
                    team.includes(searchTerm) || 
                    team.replace(/\s+/g, '').includes(searchTerm.replace(/\s+/g, '')) ||
                    team.split(' ').some(word => word.startsWith(searchTerm))
                );
                const competitionMatch = competition.includes(searchTerm) || league.includes(searchTerm);
                const timeMatch = time.includes(searchTerm);
                const logoMatch = match.team_logos && match.team_logos.some(logo => 
                    (logo.alt || '').toLowerCase().includes(searchTerm)
                );
                return teamMatch || competitionMatch || timeMatch || logoMatch;
            });
            renderAllMatches();
            if (filteredMatches.length === 0) {
                showNotification('Search Results', 'No matches found for your search');
            } else {
                showNotification('Search Results', `${filteredMatches.length} matches found`);
            }
        }

        let searchTimeout;
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(performSearch, 300);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setupEventListeners();
        });
    </script>
</body>
</html>
